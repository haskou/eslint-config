version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): \U00002b06\U0000fe0f"
      include: scope
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "eslint*"
      tooling:
        patterns:
          - "prettier"
          - "typescript"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps): \U00002b06\U0000fe0f"
      include: scope
